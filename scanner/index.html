<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Scanner with Audio</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --bg: #f8fafc;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 500px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .scanner-viewport { position: relative; background: #000; aspect-ratio: 4/3; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .viewfinder { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; height: 60%; border: 2px solid var(--primary); border-radius: 8px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.4);
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #3b82f6;
            box-shadow: 0 0 10px #3b82f6; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        .content { padding: 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select { grid-column: span 2; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        button { padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: #ef4444; color: white; }
        .result-card { background: #f1f5f9; padding: 15px; border-radius: 12px; transition: 0.3s; }
        .result-text { font-family: monospace; font-size: 1.2rem; font-weight: 700; color: var(--primary); word-break: break-all; margin-top: 5px;}
        .flash-success { background: #dcfce7 !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>Pro Scanner</h1></div>

    <div class="scanner-viewport">
        <video id="video"></video>
        <div class="viewfinder"><div class="scan-line" id="scanLine" style="display:none;"></div></div>
    </div>

    <div class="content">
        <div class="controls">
            <select id="sourceSelect"></select>
            <button class="btn-start" id="startBtn">Start Scan</button>
            <button class="btn-stop" id="stopBtn">Stop</button>
        </div>

        <div class="result-card" id="resultCard">
            <div style="font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase;">Result</div>
            <div id="result" class="result-text">Ready...</div>
        </div>
    </div>
</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    let selectedDeviceId;
    let lastResult = null;

    // --- AUDIO BEEP LOGIC ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBeep() {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = 'sine'; // Pure tone
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch A5
        
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.2);
    }

    // --- SCANNER LOGIC ---
    async function init() {
        const devices = await codeReader.listVideoInputDevices();
        const sourceSelect = document.getElementById('sourceSelect');
        
        devices.forEach(device => {
            const opt = document.createElement('option');
            opt.value = device.deviceId;
            opt.text = device.label;
            sourceSelect.appendChild(opt);
        });

        selectedDeviceId = devices[0].deviceId;
        sourceSelect.onchange = () => { selectedDeviceId = sourceSelect.value; };
    }

    document.getElementById('startBtn').addEventListener('click', () => {
        // Resume AudioContext (Browsers block audio until user clicks something)
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        document.getElementById('scanLine').style.display = 'block';
        
        codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
            if (result && result.text !== lastResult) {
                lastResult = result.text;
                
                // 1. Play the beep
                playBeep();
                
                // 2. Vibrate (mobile only)
                if(navigator.vibrate) navigator.vibrate(100);

                // 3. UI Update
                document.getElementById('result').textContent = result.text;
                const card = document.getElementById('resultCard');
                card.classList.add('flash-success');
                setTimeout(() => card.classList.remove('flash-success'), 500);

                // Reset lastResult after 3 seconds so user can scan same code again
                setTimeout(() => { lastResult = null; }, 3000);
            }
        });
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
        codeReader.reset();
        document.getElementById('scanLine').style.display = 'none';
        document.getElementById('result').textContent = "Ready...";
    });

    init();
</script>

</body>
</html>
