<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto-Scan Pro</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --dark: #0f172a;
            --sheet-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Full screen camera background */
        .scanner-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Viewfinder UI */
        .overlay {
            position: relative;
            z-index: 10;
            width: 280px;
            height: 200px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
        }

        /* Scanning Animation Line */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            animation: moveScan 2.5s ease-in-out infinite;
        }

        @keyframes moveScan {
            0%, 100% { top: 5%; opacity: 0.5; }
            50% { top: 95%; opacity: 1; }
        }

        /* Result Bottom Sheet (Mobile Optimized) */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--sheet-bg);
            color: var(--dark);
            padding: 24px;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            z-index: 100;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .handle {
            width: 40px;
            height: 5px;
            background: #e2e8f0;
            border-radius: 10px;
            margin: -10px auto 15px;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .badge {
            background: #dcfce7;
            color: var(--success);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
        }

        .result-data {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 700;
            word-break: break-all;
            color: var(--dark);
            margin: 10px 0 20px 0;
            max-height: 80px;
            overflow-y: auto;
        }

        /* Action Buttons */
        .actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn {
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: #f1f5f9; color: var(--dark); }

        /* Setup Overlay */
        #setupOverlay {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        .btn-grant {
            background: var(--primary);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Start Overlay -->
    <div id="setupOverlay">
        <h2 style="margin-bottom:10px;">Barcode Scanner</h2>
        <p style="color: #94a3b8; font-size: 0.9rem;">Auto-scanning is ready. Please enable camera permissions to start.</p>
        <button class="btn-grant" onclick="initScanner()">Open Camera</button>
    </div>

    <!-- Camera Viewport -->
    <div class="scanner-container">
        <video id="video" playsinline></video>
        <div class="overlay">
            <div class="scan-line"></div>
        </div>
    </div>

    <!-- Result Slide-up Sheet -->
    <div id="resultSheet" class="bottom-sheet">
        <div class="handle"></div>
        <div class="status-header">
            <span class="badge">Success! Barcode Detected</span>
            <span id="closeSheet" style="cursor:pointer; font-size: 20px;">&times;</span>
        </div>
        
        <div id="resultValue" class="result-data">...</div>

        <div class="actions">
            <a id="openLinkBtn" href="#" target="_blank" class="btn btn-primary" style="display: none;">
                🌐 Open Link
            </a>
            <button onclick="copyToClipboard()" class="btn btn-outline">
                📋 Copy Text
            </button>
            <button onclick="resumeScanning()" class="btn btn-outline" style="color: var(--primary);">
                🔄 Scan Next
            </button>
        </div>
    </div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const resultValue = document.getElementById('resultValue');
    const resultSheet = document.getElementById('resultSheet');
    const openLinkBtn = document.getElementById('openLinkBtn');
    const setupOverlay = document.getElementById('setupOverlay');
    
    let isPaused = false;
    let audioCtx = null;

    // --- SOUND ENGINE ---
    function playBeep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    // --- SCANNER ENGINE ---
    async function initScanner() {
        try {
            const devices = await codeReader.listVideoInputDevices();
            if (devices.length === 0) throw new Error("No camera found");

            setupOverlay.style.display = 'none';

            // Find back camera
            let selectedDevice = devices[0].deviceId;
            const backCam = devices.find(d => d.label.toLowerCase().includes('back'));
            if(backCam) selectedDevice = backCam.deviceId;

            codeReader.decodeFromVideoDevice(selectedDevice, 'video', (result, err) => {
                if (result && !isPaused) {
                    onCodeFound(result.text);
                }
            });

        } catch (err) {
            alert("Camera error: " + err.message);
        }
    }

    function onCodeFound(text) {
        isPaused = true; // Stop scanning while sheet is open
        
        playBeep();
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

        // Update UI
        resultValue.textContent = text;
        
        // Check if it's a URL
        if (text.startsWith('http://') || text.startsWith('https://')) {
            openLinkBtn.href = text;
            openLinkBtn.style.display = 'flex';
        } else {
            openLinkBtn.style.display = 'none';
        }

        // Show Sheet
        resultSheet.classList.add('active');
    }

    function resumeScanning() {
        resultSheet.classList.remove('active');
        // Small delay to prevent scanning the same code immediately
        setTimeout(() => {
            isPaused = false;
        }, 500);
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(resultValue.textContent);
        const oldText = resultValue.textContent;
        resultValue.textContent = "Copied to clipboard!";
        setTimeout(() => resultValue.textContent = oldText, 1000);
    }

    document.getElementById('closeSheet').onclick = resumeScanning;

    // Auto-init for returning users
    window.addEventListener('load', () => {
        // Many browsers allow auto-start if permissions were granted before
        initScanner();
    });
</script>

</body>
</html>
