<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro + History</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --dark: #0f172a;
            --sheet-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Full screen camera background */
        .scanner-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: relative;
            z-index: 10;
            width: 280px;
            height: 200px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            animation: moveScan 2.5s ease-in-out infinite;
        }

        @keyframes moveScan {
            0%, 100% { top: 5%; opacity: 0.5; }
            50% { top: 95%; opacity: 1; }
        }

        /* Floating History Button */
        .history-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 150;
            background: white;
            color: var(--dark);
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Result Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--sheet-bg);
            color: var(--dark);
            padding: 24px;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            transform: translateY(105%);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            z-index: 200;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
        }

        .bottom-sheet.active { transform: translateY(0); }

        /* History Drawer (Full Screen Scrollable) */
        .history-drawer {
            position: fixed;
            inset: 0;
            background: #f8fafc;
            z-index: 300;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .history-drawer.open { transform: translateY(0); }

        .drawer-header {
            padding: 20px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .history-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
        }

        .item-code { font-family: monospace; font-weight: 700; color: var(--dark); word-break: break-all; }
        .item-time { font-size: 11px; color: #94a3b8; margin-top: 5px; }

        /* General Buttons */
        .btn {
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--dark); }
        .btn-danger { background: #fef2f2; color: #dc2626; }

        #setupOverlay {
            position: fixed; inset: 0; background: var(--dark); z-index: 400;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px;
        }
    </style>
</head>
<body>

    <!-- Start Overlay -->
    <div id="setupOverlay">
        <h2 style="color:white">Pro Barcode Scanner</h2>
        <button class="btn btn-primary" style="padding: 15px 40px; border-radius: 50px;" onclick="initScanner()">Allow Camera</button>
    </div>

    <!-- History Toggle -->
    <button class="history-toggle" onclick="toggleHistory(true)">
        📜 History (<span id="historyCount">0</span>)
    </button>

    <div class="scanner-container">
        <video id="video" playsinline></video>
        <div class="overlay">
            <div class="scan-line"></div>
        </div>
    </div>

    <!-- Individual Result Sheet -->
    <div id="resultSheet" class="bottom-sheet">
        <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 15px;"></div>
        <div style="font-size: 12px; color: var(--success); font-weight: 800; margin-bottom: 10px;">MATCH FOUND</div>
        <div id="resultValue" style="font-family: monospace; font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; word-break: break-all;">...</div>
        
        <div style="display: grid; gap: 10px;">
            <a id="openLinkBtn" href="#" target="_blank" class="btn btn-primary" style="display: none;">🌐 Open Link</a>
            <button onclick="resumeScanning()" class="btn btn-secondary">Next Scan</button>
        </div>
    </div>

    <!-- History Full Drawer -->
    <div id="historyDrawer" class="history-drawer">
        <div class="drawer-header">
            <h2 style="margin:0; font-size: 1.2rem;">Scan History</h2>
            <button onclick="toggleHistory(false)" style="background:none; border:none; font-size: 24px;">&times;</button>
        </div>
        
        <div class="history-list" id="historyList">
            <!-- Items injected here -->
        </div>

        <div style="padding: 20px; background: white; border-top: 1px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="copyAllHistory()" class="btn btn-primary">📋 Copy All</button>
            <button onclick="clearHistory()" class="btn btn-danger">🗑️ Clear</button>
        </div>
    </div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const resultValue = document.getElementById('resultValue');
    const resultSheet = document.getElementById('resultSheet');
    const openLinkBtn = document.getElementById('openLinkBtn');
    const historyList = document.getElementById('historyList');
    const historyCount = document.getElementById('historyCount');
    const setupOverlay = document.getElementById('setupOverlay');
    
    let isPaused = false;
    let scanHistory = JSON.parse(localStorage.getItem('scans') || '[]');

    // --- SOUND ---
    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    // --- SCANNER ---
    async function initScanner() {
        try {
            const devices = await codeReader.listVideoInputDevices();
            setupOverlay.style.display = 'none';
            let selectedDevice = devices.find(d => d.label.toLowerCase().includes('back'))?.deviceId || devices[0].deviceId;

            codeReader.decodeFromVideoDevice(selectedDevice, 'video', (result, err) => {
                if (result && !isPaused) onCodeFound(result.text);
            });
            updateHistoryUI();
        } catch (err) { alert("Camera error: " + err); }
    }

    function onCodeFound(text) {
        isPaused = true;
        playBeep();
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

        // Save to History (prevent duplicates if same as last)
        if (scanHistory[0]?.text !== text) {
            scanHistory.unshift({ text, time: new Date().toLocaleTimeString() });
            localStorage.setItem('scans', JSON.stringify(scanHistory));
            updateHistoryUI();
        }

        // Show UI
        resultValue.textContent = text;
        openLinkBtn.style.display = (text.startsWith('http')) ? 'flex' : 'none';
        openLinkBtn.href = text;
        resultSheet.classList.add('active');
    }

    function resumeScanning() {
        resultSheet.classList.remove('active');
        setTimeout(() => isPaused = false, 500);
    }

    // --- HISTORY ACTIONS ---
    function updateHistoryUI() {
        historyCount.textContent = scanHistory.length;
        historyList.innerHTML = scanHistory.map(item => `
            <div class="history-item">
                <div class="item-code">${item.text}</div>
                <div class="item-time">${item.time}</div>
            </div>
        `).join('');
    }

    function toggleHistory(show) {
        document.getElementById('historyDrawer').classList.toggle('open', show);
    }

    function copyAllHistory() {
        if (scanHistory.length === 0) return;
        const textToCopy = scanHistory.map(h => h.text).join('\n');
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("All " + scanHistory.length + " barcodes copied to clipboard!");
        });
    }

    function clearHistory() {
        if (confirm("Delete all scan history?")) {
            scanHistory = [];
            localStorage.removeItem('scans');
            updateHistoryUI();
        }
    }

    window.addEventListener('load', initScanner);
</script>

</body>
</html>
