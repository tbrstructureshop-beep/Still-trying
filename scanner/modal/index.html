<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Modal Pro</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #226873;
            --success: #059669;
            --dark: #0f172a;
            --sheet-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scanner-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: relative;
            z-index: 10;
            width: 260px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            animation: moveScan 2.5s ease-in-out infinite;
        }

        @keyframes moveScan {
            0%, 100% { top: 5%; opacity: 0.5; }
            50% { top: 95%; opacity: 1; }
        }

        .top-controls {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 150;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.9);
            color: var(--dark);
            padding: 10px 15px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--sheet-bg);
            color: var(--dark);
            padding: 20px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            transform: translateY(105%);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            z-index: 200;
        }

        .bottom-sheet.active { transform: translateY(0); }

        .history-drawer {
            position: fixed;
            inset: 0;
            background: #f8fafc;
            z-index: 300;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .history-drawer.open { transform: translateY(0); }

        .drawer-header {
            padding: 15px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .history-list { flex: 1; overflow-y: auto; padding: 15px; }

        .history-item {
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .btn {
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--dark); }

        #setupOverlay {
            position: fixed; inset: 0; background: var(--dark); z-index: 400;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px;
        }
    </style>
</head>
<body>

    <div id="setupOverlay">
        <button class="btn btn-primary" style="width:auto; padding: 15px 40px; border-radius: 50px;" onclick="initScanner()">Open Camera</button>
    </div>

    <div class="top-controls">
        <button class="control-btn" id="torchBtn" onclick="toggleTorch()">🔦 Flash Off</button>
        <button class="control-btn" onclick="toggleHistory(true)">📜 History (<span id="historyCount">0</span>)</button>
    </div>

    <div class="scanner-container">
        <video id="video" playsinline></video>
        <div class="overlay"><div class="scan-line"></div></div>
    </div>

    <!-- Result Sheet -->
    <div id="resultSheet" class="bottom-sheet">
        <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 15px;"></div>
        <div style="font-size: 10px; color: var(--success); font-weight: 800; letter-spacing: 1px; margin-bottom: 5px;">COPIED TO FORM</div>
        <div id="resultValue" style="font-family: monospace; font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; word-break: break-all; color: var(--dark);">...</div>
        <button onclick="resumeScanning()" class="btn btn-primary">Scan Next Item</button>
    </div>

    <!-- History Drawer -->
    <div id="historyDrawer" class="history-drawer">
        <div class="drawer-header">
            <h3 style="margin:0; font-size: 1rem;">Session History</h3>
            <button onclick="toggleHistory(false)" style="background:none; border:none; font-size: 24px;">&times;</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="clearHistory()" class="btn btn-secondary" style="color: #dc2626;">Clear</button>
            <button onclick="toggleHistory(false)" class="btn btn-primary">Done</button>
        </div>
    </div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const resultValue = document.getElementById('resultValue');
    const resultSheet = document.getElementById('resultSheet');
    const historyList = document.getElementById('historyList');
    const historyCount = document.getElementById('historyCount');
    const torchBtn = document.getElementById('torchBtn');
    
    let isPaused = false;
    let torchActive = false;
    let videoTrack = null;
    let scanHistory = [];

    async function toggleTorch() {
        if (!videoTrack) return;
        const caps = videoTrack.getCapabilities();
        if (!caps.torch) return;
        try {
            torchActive = !torchActive;
            await videoTrack.applyConstraints({ advanced: [{ torch: torchActive }] });
            torchBtn.innerHTML = torchActive ? "💡 Flash On" : "🔦 Flash Off";
        } catch (e) { console.error(e); }
    }

    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    async function initScanner() {
        try {
            const devices = await codeReader.listVideoInputDevices();
            document.getElementById('setupOverlay').style.display = 'none';
            let selectedDevice = devices.find(d => d.label.toLowerCase().includes('back'))?.deviceId || devices[0].deviceId;

            const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: selectedDevice } });
            videoTrack = stream.getVideoTracks()[0];

            codeReader.decodeFromVideoDevice(selectedDevice, 'video', (result) => {
                if (result && !isPaused) onCodeFound(result.text);
            });
        } catch (err) { alert("Camera error: " + err); }
    }

    function onCodeFound(text) {
        isPaused = true;
        playBeep();
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);

        // Communicate with Parent Form
        window.parent.postMessage({ type: 'barcodeScanned', text: text }, '*');

        // History Logic
        scanHistory.unshift({ text, time: new Date().toLocaleTimeString() });
        updateHistoryUI();

        resultValue.textContent = text;
        resultSheet.classList.add('active');
    }

    function resumeScanning() {
        resultSheet.classList.remove('active');
        setTimeout(() => isPaused = false, 500);
    }

    function updateHistoryUI() {
        historyCount.textContent = scanHistory.length;
        historyList.innerHTML = scanHistory.map(item => `
            <div class="history-item">
                <div style="font-family: monospace; font-weight: 700; word-break: break-all;">${item.text}</div>
                <div style="font-size: 11px; color: #94a3b8; margin-top: 5px;">${item.time}</div>
            </div>
        `).join('');
    }

    function toggleHistory(show) {
        document.getElementById('historyDrawer').classList.toggle('open', show);
    }

    function clearHistory() {
        scanHistory = [];
        updateHistoryUI();
    }

    window.addEventListener('load', initScanner);
</script>
</body>
</html>
