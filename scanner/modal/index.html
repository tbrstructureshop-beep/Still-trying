<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Modal Pro</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #226873; /* Matched to GMF Theme */
            --success: #4b8c7d;
            --dark: #0f172a;
            --sheet-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scanner-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: relative;
            z-index: 10;
            width: 260px;
            height: 180px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            animation: moveScan 2.5s ease-in-out infinite;
        }

        @keyframes moveScan {
            0%, 100% { top: 5%; opacity: 0.5; }
            50% { top: 95%; opacity: 1; }
        }

        .top-controls {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 150;
            display: flex;
            justify-content: space-between;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.9);
            color: var(--dark);
            padding: 10px 15px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            border: none;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* Feedback Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 500;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: translate(-50%, -20%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        #setupOverlay {
            position: fixed; inset: 0; background: var(--dark); z-index: 400;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px;
        }
        
        .btn-primary { 
            background: var(--primary); 
            color: white; 
            padding: 15px 40px; 
            border-radius: 50px; 
            border: none; 
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="setupOverlay">
        <button class="btn-primary" onclick="initScanner()">Start Scanning</button>
    </div>

    <div class="top-controls">
        <button class="control-btn" id="torchBtn" onclick="toggleTorch()">
            🔦 Flash Off
        </button>
        <div id="scanCounter" class="control-btn" style="background: rgba(34, 104, 115, 0.9); color: white;">
            Items: 0
        </div>
    </div>

    <div class="scanner-container">
        <video id="video" playsinline></video>
        <div class="overlay">
            <div class="scan-line"></div>
        </div>
    </div>

    <div id="toast" class="toast">COPIED TO FORM</div>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const torchBtn = document.getElementById('torchBtn');
    const toast = document.getElementById('toast');
    const scanCounterDisplay = document.getElementById('scanCounter');
    
    let isPaused = false;
    let torchActive = false;
    let videoTrack = null;
    let scanCount = 0;
    let lastResult = "";
    let lastTime = 0;

    async function toggleTorch() {
        if (!videoTrack) return;
        const capabilities = videoTrack.getCapabilities();
        if (!capabilities.torch) return;
        try {
            torchActive = !torchActive;
            await videoTrack.applyConstraints({ advanced: [{ torch: torchActive }] });
            torchBtn.innerHTML = torchActive ? "💡 Flash On" : "🔦 Flash Off";
        } catch (e) { console.error(e); }
    }

    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    async function initScanner() {
        try {
            const devices = await codeReader.listVideoInputDevices();
            document.getElementById('setupOverlay').style.display = 'none';
            let selectedDevice = devices.find(d => d.label.toLowerCase().includes('back'))?.deviceId || devices[0].deviceId;

            const stream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: selectedDevice }
            });
            videoTrack = stream.getVideoTracks()[0];

            codeReader.decodeFromVideoDevice(selectedDevice, 'video', (result) => {
                if (result && !isPaused) onCodeFound(result.text);
            });
        } catch (err) { console.error(err); }
    }

    function onCodeFound(text) {
        const now = Date.now();
        // Prevent duplicate scan of same item within 2.5 seconds
        if (text === lastResult && now - lastTime < 2500) return;

        isPaused = true;
        lastResult = text;
        lastTime = now;
        scanCount++;
        
        playBeep();
        if(navigator.vibrate) navigator.vibrate(100);

        // SEND TO FORM (submit/index.html)
        window.parent.postMessage({
            type: 'barcodeScanned',
            text: text
        }, '*');

        // UI Feedback
        scanCounterDisplay.innerText = "Items: " + scanCount;
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
            isPaused = false;
        }, 1200); // Small pause so user knows scan succeeded
    }

    window.addEventListener('load', initScanner);
</script>
</body>
</html>
