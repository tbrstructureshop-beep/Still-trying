<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Modal</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video { width: 100%; height: 100vh; object-fit: cover; }
        .overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 40%;
            border: 2px solid #226873;
            border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: #226873; top: 0;
            animation: move 2s linear infinite;
        }
        @keyframes move { 
          0% { top: 0; } 
          50% { top: 100%; } 
          100% { top: 0; } 
        }
        .status {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: white; font-size: 14px;
        }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="overlay"><div class="scan-line"></div></div>
    <div class="status" id="status">Align barcode to scan</div>

    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        let lastResult = null;
        let lastScanTime = 0;

        async function start() {
            try {
                const devices = await codeReader.listVideoInputDevices();
                const backCamera = devices.find(d => d.label.toLowerCase().includes('back')) || devices[0];
                
                codeReader.decodeFromVideoDevice(backCamera.deviceId, 'video', (result, err) => {
                    if (result) {
                        const now = Date.now();
                        // Prevent duplicate scans within 2 seconds
                        if (result.text !== lastResult || now - lastScanTime > 2000) {
                            lastResult = result.text;
                            lastScanTime = now;
                            
                            // Send data to Parent (submit/index.html)
                            window.parent.postMessage({
                                type: 'barcodeScanned',
                                text: result.text
                            }, '*');

                            document.getElementById('status').innerText = "Scanned: " + result.text;
                            setTimeout(() => { 
                                document.getElementById('status').innerText = "Align barcode to scan"; 
                            }, 1500);
                        }
                    }
                });
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Camera Error: " + err;
            }
        }
        window.onload = start;
    </script>
</body>
</html>
