<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Modal Pro</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #226873;
            --success: #059669;
            --dark: #0f172a;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scanner-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: relative;
            z-index: 10;
            width: 280px;
            height: 160px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            animation: moveScan 2.5s ease-in-out infinite;
        }

        @keyframes moveScan {
            0%, 100% { top: 5%; opacity: 0.5; }
            50% { top: 95%; opacity: 1; }
        }

        .top-controls {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 150;
            display: flex;
            justify-content: space-between;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.9);
            color: var(--dark);
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Result Popup */
        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 20px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            transform: translateY(105%);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            z-index: 200;
            text-align: center;
        }
        .bottom-sheet.active { transform: translateY(0); }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        #setupOverlay {
            position: fixed; inset: 0; background: var(--dark); z-index: 400;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="setupOverlay">
        <button class="btn" style="width:auto; padding: 15px 40px; border-radius: 50px;" onclick="initScanner()">Open Camera</button>
    </div>

    <div class="top-controls">
        <button class="control-btn" id="torchBtn" onclick="toggleTorch()">🔦 Flash Off</button>
        <div class="control-btn" style="background: var(--primary); color: white;">PRO MODE</div>
    </div>

    <div class="scanner-container">
        <video id="video" playsinline></video>
        <div class="overlay">
            <div class="scan-line"></div>
        </div>
    </div>

    <div id="resultSheet" class="bottom-sheet">
        <div style="font-size: 11px; color: var(--success); font-weight: 800; margin-bottom: 5px;">ITEM SCANNED</div>
        <div id="resultValue" style="font-family: monospace; font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: var(--dark);">...</div>
        <button onclick="resumeScanning()" class="btn">Next Scan</button>
    </div>

<script>
    // FIX: Define hints to focus on 1D barcodes (EAN-13, Code 128)
    // This prevents the "weird" GS1/DataMatrix results
    const hints = new Map();
    const formats = [
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.UPC_A
    ];
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);

    const codeReader = new ZXing.BrowserMultiFormatReader(hints);
    const resultValue = document.getElementById('resultValue');
    const resultSheet = document.getElementById('resultSheet');
    const torchBtn = document.getElementById('torchBtn');
    
    let isPaused = false;
    let torchActive = false;
    let videoTrack = null;

    async function toggleTorch() {
        if (!videoTrack) return;
        const capabilities = videoTrack.getCapabilities();
        if (!capabilities.torch) return;
        try {
            torchActive = !torchActive;
            await videoTrack.applyConstraints({ advanced: [{ torch: torchActive }] });
            torchBtn.innerHTML = torchActive ? "💡 Flash On" : "🔦 Flash Off";
        } catch (e) { console.error(e); }
    }

    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    async function initScanner() {
        try {
            const devices = await codeReader.listVideoInputDevices();
            document.getElementById('setupOverlay').style.display = 'none';
            let selectedDevice = devices.find(d => d.label.toLowerCase().includes('back'))?.deviceId || devices[0].deviceId;

            const stream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: selectedDevice, facingMode: 'environment' }
            });
            videoTrack = stream.getVideoTracks()[0];

            codeReader.decodeFromVideoDevice(selectedDevice, 'video', (result) => {
                if (result && !isPaused) onCodeFound(result.text);
            });
        } catch (err) { alert("Camera error: " + err); }
    }

    function onCodeFound(text) {
        isPaused = true;
        playBeep();
        if(navigator.vibrate) navigator.vibrate(100);

        // Send ONLY the text to the parent form
        window.parent.postMessage({ type: 'barcodeScanned', text: text }, '*');

        resultValue.textContent = text;
        resultSheet.classList.add('active');
    }

    function resumeScanning() {
        resultSheet.classList.remove('active');
        setTimeout(() => isPaused = false, 500);
    }

    window.addEventListener('load', initScanner);
</script>
</body>
</html>
