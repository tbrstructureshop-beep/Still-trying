<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electronic SP List | GMF AeroAsia</title>
  <meta name="description" content="Management system for Electronic SP List">
  <!-- Open Graph for WhatsApp/Teams previews -->
  <meta property="og:title" content="Electronic SP List">
  <meta property="og:image" content="https://sp.gmf-aeroasia.co.id/assets/gmf-logo.webp">
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="https://sp.gmf-aeroasia.co.id/assets/gmf-logo.webp">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    :root {
      --primary: #0056b3;
      --success: #25D366;
      --warning: #ffc107;
      --dark: #333;
      --light-bg: #f8f9fa;
      --shadow: 0 4px 12px rgba(0,0,0,0.15);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1749746766518-7d52a30c87cb?q=80&w=1638&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
      color: var(--dark);
      min-height: 100vh;
    }

    .container {
      margin: 10px auto;
      padding: 15px;
      width: 95%;
      max-width: 1200px;
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 15px;
      min-height: 95vh;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      box-sizing: border-box;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #eee;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header img { height: 40px; }
    .header h1 { font-size: 1.2rem; margin: 0; color: #1a1a1a; }

    /* Controls Layout */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .search-bar { width: 100%; }
    .search-bar input {
      width: 100%;
      padding: 12px 20px;
      border: 1px solid #ccc;
      border-radius: 30px;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }

    .actions-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button-group { display: flex; gap: 8px; flex-wrap: wrap; }
    
    .button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-block;
      text-align: center;
    }
    .btn-create { background: #28a745; }
    .btn-refresh { background: var(--primary); }
    .btn-edit {background: #30518a; }

    select#rowsDropdown {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
      font-size: 0.85rem;
    }

    /* Card Grid */
    #cardContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: var(--shadow);
      border: 1px solid #eee;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s;
      box-sizing: border-box;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .sp-no { font-weight: bold; color: var(--primary); font-size: 1rem; }
    .sp-date { font-size: 0.7rem; color: #888; }

    /* Info Grid: Responsive 2-col to 1-col */
    .card-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }
    .data-item { display: flex; flex-direction: column; overflow: hidden; }
    .label { font-size: 0.65rem; text-transform: uppercase; color: #999; font-weight: bold; }
    .value { font-size: 0.85rem; color: #333; font-weight: 500; word-wrap: break-word; }

    /* Collapsible Description */
    .desc-section { margin-top: 5px; border-top: 1px dashed #ddd; padding-top: 10px; }
    details { background: #f9f9f9; border-radius: 6px; border: 1px solid #eee; }
    summary { padding: 8px; font-size: 0.85rem; font-weight: bold; color: var(--primary); cursor: pointer; }
    
    .table-wrapper { overflow-x: auto; width: 100%; }
    .desc-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 250px; }
    .desc-table th { background: #f1f1f1; text-align: left; padding: 6px; border-bottom: 2px solid #ddd; }
    .desc-table td { padding: 6px; border-bottom: 1px solid #eee; }

    .card-footer {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sig-box img { max-height: 35px; max-width: 100px; mix-blend-mode: multiply; }
    .action-icons { display: flex; gap: 12px; }
    .action-icons img { width: 28px; height: 28px; }

    /* Utils */
    #gifOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8);
      display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .pagination { display: flex; justify-content: center; gap: 10px; padding: 20px; align-items: center; flex-wrap: wrap;}
    .pagination button { padding: 10px 18px; border-radius: 5px; border: 1px solid #ccc; background: #fff; cursor: pointer; }

        /* CSS to handle printing from the modal */
    @media print {
        body > *:not(#formModal) { display: none !important; }
        #formModal { position: absolute; top:0; left:0; width:100%; height:auto; background:white !important; padding:0; }
        #formModal .no-print { display: none !important; }
        #formModal div { height: auto !important; margin:0 !important; box-shadow:none !important; }
        iframe { height: 1500px; } /* Set height to fit A4 */
    }

    /* Mobile Specific Overrides */
    @media (max-width: 768px) {
      .container { width: 98%; margin: 5px auto; padding: 12px; }
      .header { flex-direction: column; text-align: center; }
      .header h1 { font-size: 1.1rem; }
      
      .actions-row { flex-direction: column; align-items: stretch; }
      .button-group { justify-content: center; }
      .button { flex: 1; }
      
      #cardContainer { grid-template-columns: 1fr; }
      .card-info-grid { grid-template-columns: 1fr; } /* Stack items for readability */
      
      .sp-no { font-size: 0.95rem; }
      .pagination button { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>

  <div id="gifOverlay">
    <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExYzUwendzZ3o4Y29xOGE2ZG4xcWJ2enkxd284dmF0aWJwanlraWR4biZlcD12MV9pbnRlcm5naWZfYnlfaWQmY3Q9cw/eK7Nj68Yur6vRmVyqN/giphy.gif" width="50">
  </div>

  <div class="container">
    <div class="header">
      <img src="https://sp.gmf-aeroasia.co.id/assets/gmf-logo.webp" alt="Logo">
      <h1>Electronic SP List</h1>
    </div>

    <div class="controls">
      <div class="search-bar">
        <input type="text" id="searchBox" placeholder="Search SP Number, Customer, or Parts..." onkeyup="handleFilter()">
      </div>
      <div class="actions-row">
        <div class="button-group">
          <a href="https://script.google.com/macros/s/AKfycbywQtJSCi82b42qw_Q5WrAgoAmPmtko6Gk8E1VK9-uoe8xqRD55lnw23cqb3AixljP5/exec" class="button btn-create" target="_blank">＋ New SP</a>
          <a href="https://script.google.com/macros/s/AKfycbyTAT92ylz8DUnyz3CkFlD-nPqfXFKjG4_swRsDkl_EUlcZswyS-D5bRzcqa1xRJBR-lA/exec" class="button btn-edit" target="_blank">Edit SP</a>
          <button class="button btn-refresh" onclick="fetchData()">⟳ Refresh</button>
        </div>
        <select id="rowsDropdown" onchange="changeRowsPerPage()">
          <option value="12">12 Cards</option>
          <option value="24">24 Cards</option>
          <option value="48">48 Cards</option>
        </select>
      </div>
    </div>

    <div id="cardContainer"></div>
    <div id="noDataMessage" style="display:none; text-align:center; padding:40px; color:#666;">No results found.</div>
    <div class="pagination" id="pagination"></div>
  </div>
  
  <!-- Modal Overlay -->
  <div id="formModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; padding:20px; box-sizing:border-box;">
    <!-- Modal Toolbar -->
    <div style="max-width:900px; margin:0 auto 10px auto; display:flex; justify-content:flex-end; gap:10px;" class="no-print">
      <!-- ADDED PRINT BUTTON HERE -->
      <button onclick="printIframe()" style="padding:10px 20px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Print to PDF</button>
      <button onclick="closeFormModal()" style="padding:10px 20px; background:#dc3545; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">✕ Close</button>
    </div>
    
    <!-- The Iframe -->
    <div style="max-width:900px; height:calc(100% - 60px); margin:0 auto; background:white; border-radius:8px; overflow:hidden; box-shadow:0 0 30px rgba(0,0,0,0.5);">
      <iframe id="formIframe" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>
  </div>
</body>
  
<script>
    // [STAYS EXACTLY THE SAME AS YOUR ORIGINAL CODE]
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTcm6VhsS6UO8X9ueZulzk-ysTUP7xhIpmeT_R1OFPsbh37lPZbNdZ1vgcekX_xpxOwK9EfFpEa_84F/pub?gid=1284751190&single=true&output=csv";
    const DOCS_ICON = "https://www.gstatic.com/images/branding/product/1x/docs_2020q4_48dp.png";
    const WA_ICON = "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/2044px-WhatsApp.svg.png";

    let rawData = [];
    let filteredData = [];
    let currentPage = 1;
    let rowsPerPage = 12;

    async function fetchData() {
      document.getElementById("gifOverlay").style.display = "flex";
      try {
        const response = await fetch(SHEET_URL);
        const csvData = await response.text();
        const result = Papa.parse(csvData, { header: true, skipEmptyLines: true });
        rawData = result.data.reverse();
        filteredData = [...rawData];
        renderCards();
      } catch (e) { console.error(e); } 
      finally { document.getElementById("gifOverlay").style.display = "none"; }
    }

    function formatDescriptionTable(text) {
      if (!text || text.trim() === "") return `<div style="padding:10px; font-size:0.8rem; color:#999;">No description provided.</div>`;
      
      const lines = text.split('\n').filter(l => l.trim() !== "");
      let rowsHtml = lines.map(line => {
        const cols = line.split('|').map(c => c.trim());
        return `
          <tr>
            <td>${cols[0] || ''}</td>
            <td>${cols[1] || ''}</td>
            <td>${cols[2] || ''}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="table-wrapper">
          <table class="desc-table">
            <thead>
              <tr>
                <th>Qty</th>
                <th>Description</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      `;
    }

    function renderCards() {
      const container = document.getElementById("cardContainer");
      const start = (currentPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      const pageData = filteredData.slice(start, end);

      if (pageData.length === 0) {
        container.innerHTML = "";
        document.getElementById("noDataMessage").style.display = "block";
        document.getElementById("pagination").innerHTML = "";
        return;
      }
      document.getElementById("noDataMessage").style.display = "none";

      container.innerHTML = pageData.map(row => {
        const keys = Object.keys(row);
        const spNumber = row[keys[0]] || "N/A";
        const date = row["Timestamp"] || "";
        
        const docKey = keys.find(k => k.toLowerCase().includes("url") && !k.toLowerCase().includes("whatsapp"));
        const waKey = keys.find(k => k.toLowerCase().includes("whatsapp"));
        const sigKey = keys.find(k => k.toLowerCase().includes("signature") || k.toLowerCase().includes("image"));
        const descKey = keys.find(k => k.toLowerCase() === "description");

        const docUrl = docKey ? row[docKey] : null;
        const waUrl = waKey ? row[waKey] : null;
        const sigVal = sigKey && row[sigKey] ? (row[sigKey].startsWith("data:image") ? row[sigKey] : "data:image/png;base64," + row[sigKey]) : null;

        const infoGrid = keys.map(key => {
          const val = row[key];
          const kLow = key.toLowerCase();
          if (!val || kLow === "description" || kLow.includes("url") || kLow.includes("signature") || kLow.includes("image") || kLow.includes("whatsapp") || kLow === "timestamp" || key === keys[0]) return "";
          
          return `
            <div class="data-item">
              <span class="label">${key}</span>
              <span class="value">${val}</span>
            </div>
          `;
        }).join('');

        return `
          <div class="card">
            <div class="card-header">
              <div class="sp-no"># ${spNumber}</div>
              <div class="sp-date">${date}</div>
            </div>
            
            <div class="card-info-grid">
              ${infoGrid}
            </div>

            <div class="desc-section">
              <details>
                <summary>Items / Description</summary>
                ${formatDescriptionTable(row[descKey])}
              </details>
            </div>

            <div class="card-footer">
              <div class="sig-box">
                ${sigVal ? `<img src="${sigVal}" alt="Sig">` : '<span class="label">No Sig</span>'}
              </div>
              <div class="action-icons">
              <a href="javascript:void(0)" onclick='openFormModal(${JSON.stringify(row)})' title="View Document">
              <img src="${DOCS_ICON}">
              </a>
                ${waUrl ? `<a href="${waUrl}" target="_blank" title="WA Notif"><img src="${WA_ICON}"></a>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');

      renderPagination();
    }

    function handleFilter() {
      const q = document.getElementById("searchBox").value.toLowerCase();
      filteredData = rawData.filter(row => 
        Object.values(row).some(v => String(v).toLowerCase().includes(q))
      );
      currentPage = 1;
      renderCards();
    }

    function openForm(rowData) {
      // Save the data to the browser's storage
      localStorage.setItem('currentSPData', JSON.stringify(rowData));
      // Redirect to the form directory
      window.location.href = 'form/index.html';
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredData.length / rowsPerPage);
      const container = document.getElementById("pagination");
      container.innerHTML = `
        <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>
        <span style="font-size:0.85rem; font-weight:bold;">Page ${currentPage} / ${totalPages || 1}</span>
        <button onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Next</button>
      `;
    }

    function changePage(p) {
      currentPage = p;
      renderCards();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function changeRowsPerPage() {
      rowsPerPage = parseInt(document.getElementById("rowsDropdown").value);
      currentPage = 1;
      renderCards();
    }

  function printIframe() {
    const iframe = document.getElementById('formIframe');
    if (iframe) {
        // This targets the window inside the iframe and triggers print
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
    }
}

function openFormModal(rowData) {
    localStorage.setItem('currentSPData', JSON.stringify(rowData));
    const iframe = document.getElementById('formIframe');
    // Important: Setting the source triggers the data-mapping script in form/index.html
    iframe.src = 'form/index.html'; 
    
    document.getElementById('formModal').style.display = 'block';
    document.body.style.overflow = 'hidden'; 
}

function closeFormModal() {
    document.getElementById('formModal').style.display = 'none';
    document.getElementById('formIframe').src = ''; 
    document.body.style.overflow = 'auto'; 
}

    fetchData();
  </script>
  
</html>
