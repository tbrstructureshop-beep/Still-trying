<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aviation Ops | Overtime Manager</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  
  <!-- Flatpickr (Calendar & Clock) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    :root {
      --primary: #2b868c;
      --primary-dark: #1f6368;
      --primary-light: #eaf3f4;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--bg); 
      color: var(--text-main); 
      line-height: 1.5;
      min-height: 100vh;
    }

    /* --- NAVIGATION --- */
    .nav-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 70px;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand i { 
      background: var(--primary); 
      color: white; 
      padding: 8px; 
      border-radius: 10px;
      font-size: 24px;
    }
    .brand-text h1 { font-size: 1.1rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
    .brand-text p { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }

    .nav-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 12px; }
    .nav-item {
      border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;
      font-size: 0.85rem; font-weight: 700; color: var(--text-muted); background: transparent;
      transition: 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .nav-item.active { background: white; color: var(--primary); box-shadow: var(--shadow); }

    /* --- LAYOUT --- */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }

    /* --- CARDS --- */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }

    .status-badge {
      position: absolute; top: 1.5rem; right: 1.5rem;
      padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
    }
    .status-OPEN { background: #fef3c7; color: #92400e; }
    .status-SUBMITTED { background: #dcfce7; color: #166534; }

    .card-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
    .card-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; display: block; }
    
    .timeline { background: var(--bg); border-radius: var(--radius-md); padding: 12px; margin-bottom: 1.5rem; }
    .timeline-row { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
    .timeline-row i { font-size: 18px; color: var(--primary); }

    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 1rem; border-top: 1px solid var(--border);
    }
    .stat-box { text-align: right; }
    .stat-label { font-size: 0.6rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; display: block; }
    .stat-value { font-size: 1.2rem; font-weight: 800; color: var(--primary); }

    /* --- MODAL UPDATES --- */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-content {
      background: white; width: 100%; max-width: 600px; border-radius: 24px;
      overflow: hidden; animation: modalIn 0.3s ease-out; 
      max-height: 90vh; /* Reduced for better mobile visibility */
      display: flex; flex-direction: column;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .modal-header { padding: 1.2rem 1.5rem; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .modal-body { padding: 1.5rem; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .col-span-2 { grid-column: span 2; }

    .input-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
    .input-group input, .input-group textarea {
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
      font-family: inherit; font-size: 0.95rem; transition: 0.2s; background: #fcfcfd;
    }
    
    /* Toggle Switch Styles */
    .toggle-container {
      display: flex; align-items: center; gap: 10px; padding: 10px; 
      background: var(--bg); border-radius: 10px; margin-bottom: 1rem;
    }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0; background-color: #cbd5e1;
      transition: .4s; border-radius: 24px;
    }
    .slider:before {
      position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }

    .calc-display {
      background: var(--primary-light); border: 2px dashed var(--primary);
      padding: 10px; border-radius: 10px; text-align: center;
      color: var(--primary); font-size: 1.5rem; font-weight: 800;
    }

    .modal-footer { padding: 1.2rem 1.5rem; background: #f8fafc; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; flex-shrink: 0; }

    /* --- BUTTONS --- */
    .btn {
      padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700;
      cursor: pointer; transition: 0.2s; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-accent { background: var(--accent); color: white; }

    .fab {
      position: fixed; bottom: 2rem; right: 2rem; width: 60px; height: 60px;
      background: var(--primary); color: white; border-radius: 20px; border: none;
      box-shadow: 0 10px 25px rgba(43, 134, 140, 0.4); cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }

    /* --- MOBILE --- */
    @media (max-width: 600px) {
      .modal { padding: 0; }
      .modal-content { height: 100%; max-height: 100%; border-radius: 0; }
      .form-grid { grid-template-columns: 1fr; }
      .col-span-2 { grid-column: span 1; }
    }

    #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 3000; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <div class="brand">
      <i class="material-icons-round">flight_takeoff</i>
      <div class="brand-text">
        <h1>OPS DASHBOARD</h1>
        <p>Aviation Personnel Overtime</p>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-item active" id="tab-OPEN" onclick="ui.switchTab('OPEN')">
        <i class="material-icons-round">schedule</i> Pending
      </button>
      <button class="nav-item" id="tab-SUBMITTED" onclick="ui.switchTab('SUBMITTED')">
        <i class="material-icons-round">check_circle</i> Processed
      </button>
    </div>
  </nav>

  <main class="container">
    <div id="grid" class="grid"></div>
  </main>

  <button class="fab" onclick="ui.openModal()">
    <i class="material-icons-round">add</i>
  </button>

  <div id="loader">
    <div class="spinner"></div>
    <p style="font-weight: 700; color: var(--primary)">Processing Data...</p>
  </div>

  <!-- Modal -->
  <div id="formModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle" style="font-size: 1.2rem;">New Entry</h2>
        <i class="material-icons-round" style="cursor:pointer" onclick="ui.closeModal()">close</i>
      </div>
      
      <form id="otForm" style="display:contents">
        <div class="modal-body">
          <input type="hidden" id="f_id">
          <div class="form-grid">
            <div class="input-group">
              <label>Employee Name</label>
              <input type="text" id="f_employee" required>
            </div>
            <div class="input-group">
              <label>Personal Number (PN)</label>
              <input type="text" id="f_pn" required placeholder="PN-XXXX">
            </div>
            
            <div class="input-group">
              <label>Duty Start</label>
              <input type="text" id="f_from" class="datetime-picker" required>
            </div>
            <div class="input-group">
              <label>Duty End</label>
              <input type="text" id="f_until" class="datetime-picker" required>
            </div>

            <div class="col-span-2">
              <div class="toggle-container">
                <label class="switch">
                  <input type="checkbox" id="f_rest_toggle" onchange="logic.toggleRest()">
                  <span class="slider"></span>
                </label>
                <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-main)">Include Rest Period?</span>
              </div>
            </div>

            <div id="rest_fields" class="col-span-2 form-grid" style="display:none; margin-top: -10px;">
              <div class="input-group">
                <label>Rest Start</label>
                <input type="text" id="f_rest_start" class="datetime-picker">
              </div>
              <div class="input-group">
                <label>Rest End</label>
                <input type="text" id="f_rest_end" class="datetime-picker">
              </div>
            </div>

            <div class="input-group col-span-2">
              <label>Total Calculated Duty (Minus Rest)</label>
              <input type="text" id="f_total" readonly class="calc-display">
            </div>

            <div class="input-group col-span-2">
              <label>Remarks</label>
              <textarea id="f_remarks" rows="3"></textarea>
            </div>
            <div class="input-group col-span-2" id="fileZone">
              <label>Evidence Document</label>
              <input type="file" id="f_file">
              <div id="evidenceLink" style="margin-top: 10px;"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="ui.closeModal()">Cancel</button>
          <button type="submit" id="saveBtn" class="btn btn-primary">Save Draft</button>
          <button type="button" id="submitBtn" class="btn btn-accent" style="display:none" onclick="logic.finalize()">Finalize to HC</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzX9vu9-02sXQjxDIOs_bXWuqw1R2BHaooolv0ytvXkfR7LJ1aHvJVnRuaBEpbQcWkL/exec";
    
    // Initialize Flatpickr for better Desktop experience
    const fpConfig = {
      enableTime: true,
      time_24hr: true,
      dateFormat: "Y-m-d H:i",
      onChange: () => logic.calc()
    };

    let pickers = {};

    const ui = {
      data: [],
      filter: 'OPEN',

      init() {
        // Initialize Pickers
        pickers.from = flatpickr("#f_from", fpConfig);
        pickers.until = flatpickr("#f_until", fpConfig);
        pickers.restStart = flatpickr("#f_rest_start", fpConfig);
        pickers.restEnd = flatpickr("#f_rest_end", fpConfig);

        this.refresh();
        document.getElementById('otForm').onsubmit = (e) => { e.preventDefault(); logic.save(); };
      },

      async refresh() {
        this.toggleLoader(true);
        try {
          this.data = await logic.call('getRecords');
          this.render();
        } catch(e) { console.error(e); }
        this.toggleLoader(false);
      },

      render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const filtered = this.data.filter(r => r.Status === this.filter);
        
        if (!filtered.length) {
          grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 4rem; opacity: 0.5;">
            <i class="material-icons-round" style="font-size: 48px;">folder_open</i>
            <p>No records found in ${this.filter} status</p>
          </div>`;
          return;
        }

        filtered.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.onclick = () => this.openModal(item);
          card.innerHTML = `
            <span class="status-badge status-${item.Status}">${item.Status}</span>
            <div class="card-title">${item.Employee}</div>
            <span class="card-subtitle">PN: ${item['Personal Number']}</span>
            
            <div class="timeline">
              <div class="timeline-row"><i class="material-icons-round">login</i> ${logic.formatDate(item['From DateTime'])}</div>
              <div class="timeline-row"><i class="material-icons-round">logout</i> ${logic.formatDate(item['Until DateTime'])}</div>
            </div>

            <div class="card-footer">
               <div style="font-size: 0.65rem; color: var(--text-muted)">
                ${item.Timestamp.split('T')[0]}
               </div>
               <div class="stat-box">
                 <span class="stat-label">Total Duration</span>
                 <span class="stat-value">${item['Total Time']}</span>
               </div>
            </div>
          `;
          grid.appendChild(card);
        });
      },

      switchTab(t) {
        this.filter = t;
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.id === 'tab-'+t));
        this.render();
      },

      openModal(item = null) {
        const form = document.getElementById('otForm');
        const isSubmitted = item && item.Status === 'SUBMITTED';
        form.reset();
        
        document.getElementById('f_id').value = item ? item.ID : '';
        document.getElementById('modalTitle').innerText = item ? 'Update Record' : 'New Duty Entry';
        
        if (item) {
          pickers.from.setDate(item['From DateTime']);
          pickers.until.setDate(item['Until DateTime']);
          document.getElementById('f_employee').value = item.Employee;
          document.getElementById('f_pn').value = item['Personal Number'];
          document.getElementById('f_total').value = item['Total Time'];
          document.getElementById('f_remarks').value = item.Remarks;
          
          // Logic for Rest Display in Edit
          const hasRest = item['Rest Start'] && item['Rest Start'] !== "";
          document.getElementById('f_rest_toggle').checked = hasRest;
          document.getElementById('rest_fields').style.display = hasRest ? 'grid' : 'none';
          if(hasRest) {
            pickers.restStart.setDate(item['Rest Start']);
            pickers.restEnd.setDate(item['Rest End']);
          }

          document.getElementById('evidenceLink').innerHTML = item['Evidence File URL'] ? 
            `<a href="${item['Evidence File URL']}" target="_blank" style="color:var(--primary); font-weight:700; text-decoration:none;">View Attachment</a>` : '';
        } else {
          document.getElementById('rest_fields').style.display = 'none';
          document.getElementById('f_rest_toggle').checked = false;
        }

        document.getElementById('submitBtn').style.display = (item && !isSubmitted) ? 'flex' : 'none';
        document.getElementById('saveBtn').style.display = isSubmitted ? 'none' : 'flex';
        
        // Disable fields if submitted
        form.querySelectorAll('input, textarea').forEach(el => { if(el.id !== 'f_id') el.disabled = isSubmitted });
        document.getElementById('formModal').style.display = 'flex';
      },

      closeModal() { document.getElementById('formModal').style.display = 'none'; },
      toggleLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
    };

    const logic = {
      toggleRest() {
        const show = document.getElementById('f_rest_toggle').checked;
        document.getElementById('rest_fields').style.display = show ? 'grid' : 'none';
        this.calc();
      },

      calc() {
        const from = pickers.from.selectedDates[0];
        const until = pickers.until.selectedDates[0];
        
        if (!from || !until) return;
        
        let dutyMs = until - from;
        let restMs = 0;

        if (document.getElementById('f_rest_toggle').checked) {
          const rStart = pickers.restStart.selectedDates[0];
          const rEnd = pickers.restEnd.selectedDates[0];
          if (rStart && rEnd) {
            restMs = rEnd - rStart;
          }
        }

        let diff = dutyMs - restMs;
        if (diff < 0) diff = 0;

        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        document.getElementById('f_total').value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      },

      formatDate(str) {
        if(!str) return '--/--';
        const d = new Date(str);
        return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
      },

      async save() {
        ui.toggleLoader(true);
        const fileInput = document.getElementById('f_file');
        let evidenceUrl = document.querySelector('#evidenceLink a')?.href || "";

        try {
          if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const base64 = await this.toBase64(file);
            evidenceUrl = await this.call('uploadFile', [base64, file.name]);
          }

          const payload = {
            id: document.getElementById('f_id').value,
            employee: document.getElementById('f_employee').value,
            pn: document.getElementById('f_pn').value,
            from: document.getElementById('f_from').value,
            until: document.getElementById('f_until').value,
            rest_start: document.getElementById('f_rest_toggle').checked ? document.getElementById('f_rest_start').value : "",
            rest_end: document.getElementById('f_rest_toggle').checked ? document.getElementById('f_rest_end').value : "",
            total: document.getElementById('f_total').value,
            remarks: document.getElementById('f_remarks').value,
            evidence: evidenceUrl
          };

          await this.call('saveOvertime', [payload]);
          ui.closeModal();
          ui.refresh();
        } catch(e) { alert(e); }
        finally { ui.toggleLoader(false); }
      },

      async finalize() {
        if (!confirm("Finalize this record for HC? No further edits allowed.")) return;
        ui.toggleLoader(true);
        await this.call('changeStatus', [document.getElementById('f_id').value]);
        ui.closeModal();
        ui.refresh();
      },

      toBase64: (f) => new Promise((res, rej) => {
        const r = new FileReader(); r.readAsDataURL(f);
        r.onload = () => res(r.result); r.onerror = e => rej(e);
      }),

      async call(fn, args = []) {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          return new Promise((res, rej) => {
            google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn](...args);
          });
        } else {
          const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ action: fn, data: args[0] }) 
          });
          const result = await response.json();
          if (result.status === 'success') return result.data;
          throw new Error(result.message);
        }
      }
    };

    ui.init();
  </script>
</body>
</html>
