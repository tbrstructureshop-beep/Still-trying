<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surat Pengiriman | GMF</title>
  <style>
    :root {
      --primary: #226873;
      --primary-light: #f0f6f7;
      --primary-border: #d1e2e5;
      --text-main: #2c3e50;
      --text-muted: #546e7a;
      --white: #ffffff;
      --soft-red: #b35c5c;
      --soft-green: #4b8c7d;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--white);
      color: var(--text-main);
      margin: 0;
      padding: 10px;
      line-height: 1.5;
    }

    .form-container {
      background-color: var(--white);
      max-width: 850px;
      margin: 10px auto;
      padding: 30px;
      border: 1px solid var(--primary-border);
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(34, 104, 115, 0.08);
      position: relative;
    }

    /* Menu container styles */
    .menu-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
    }

    .menu-toggle {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 8px 12px;
      font-size: 20px;
      border-radius: 4px;
      cursor: pointer;
    }

    .menu-dropdown {
      display: none;
      position: absolute;
      top: 45px;
      right: 0;
      background-color: white;
      border: 1px solid var(--primary-border);
      box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
      border-radius: 4px;
      min-width: 180px;
    }

    .menu-dropdown a {
      display: block;
      color: var(--text-main);
      text-decoration: none;
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid #f5f5f5;
    }

    .menu-dropdown a:hover {
      background-color: var(--primary-light);
      color: var(--primary);
    }

    .menu-container.open .menu-dropdown {
      display: block;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      border-bottom: 2px solid var(--primary-light);
      padding-bottom: 20px;
    }

    .header img {
      width: 160px;
      margin-bottom: 15px;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header h2 {
      margin: 5px 0 0;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    label {
      font-weight: 600;
      display: block;
      margin: 15px 0 6px;
      font-size: 11px;
      color: var(--primary);
      text-transform: uppercase;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--primary-border);
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
      background-color: #fafbfc;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #fff;
    }

    input[readonly] {
      background-color: var(--primary-light);
      color: var(--text-muted);
    }

    /* Table Styling */
    .table-wrapper {
      overflow-x: auto;
      margin: 25px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th {
      background-color: var(--primary);
      color: white;
      font-weight: 500;
      font-size: 12px;
      padding: 12px;
      text-transform: uppercase;
      text-align: center;
    }

    /* Target the first column (Row Number) */
    td {
      border: 1px solid var(--primary-border);
      padding: 5px;
      text-align: center; /* Centers the "1, 2, 3" row numbers */
      font-size: 14px;
    }

    td input {
      border: none;
      background: transparent;
      text-align: center;
    }

    /* Maintain Left Alignment for Description for better readability */
    td:nth-child(3) input {
      text-align: left;
    }

    /* Signatures */
    .canvas-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 20px;
      margin-top: 30px;
    }

    .signature-box {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
      background-color: var(--primary-light);
      border-radius: 6px;
    }

    canvas {
      border: 1px solid var(--primary-border);
      background-color: white;
      width: 100%;
      height: 120px;
      border-radius: 4px;
      touch-action: none;
    }

    /* Buttons */
    .button-container {
      text-align: center;
      margin: 25px 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .red-button { background-color: var(--soft-red); }
    .green-button { background-color: var(--soft-green); padding: 12px 30px; font-size: 15px; }

    /* Upload Area */
    .upload-container {
      margin-top: 30px;
      padding: 20px;
      border: 2px dashed var(--primary-border);
      border-radius: 8px;
      text-align: center;
    }

    #imagePreview {
      max-width: 250px;
      margin-top: 15px;
      border-radius: 4px;
    }

    #loadingGif {
      position: fixed;
      inset: 0;
      background-color: rgba(255, 255, 255, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--soft-green);
      color: white;
      padding: 12px 25px;
      border-radius: 30px;
      display: none;
    }

    @media (max-width: 600px) {
      .form-container { padding: 15px; }
      .signature-box { min-width: 100%; }
      .button-container { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>

  <div id="loadingGif">
    <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExeWc0djRoenZ1YWhjcjdkMmk3YWN6dGpvN29qZGo1bGViMzI4OXdqcyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/eK7Nj68Yur6vRmVyqN/giphy.gif" alt="Loading..." width="100">
  </div>

  <div class="form-container">
    <div class="menu-container">
      <button class="menu-toggle" type="button">☰</button>
      <div class="menu-dropdown">
        <a href="https://shorturl.at/lgPJ7" target="_blank">Edit SP</a>
        <a href="https://shorturl.at/uSCeY" target="_blank">Go to Dashboard</a>
        <a href="#" onclick="location.reload()">Refresh</a>
      </div>
    </div>

    <div class="header">
      <img src="https://www.gmf-aeroasia.co.id/cfind/source/thumb/images/cover_w241_h51_gmf%20aeroasia%20logo%20new%20blue.png" alt="Logo">
      <h1>Surat Pengiriman</h1>
      <h2>SHIPPING DOCUMENT</h2>
    </div>

    <form id="shippingForm">
      <label>SP No.</label>
      <input type="text" id="spNo" readonly>

      <label>To (Unit Tujuan)</label>
      <input type="text" id="to" placeholder="Destination Unit" required>

      <label>Sent By (Unit Pengirim)</label>
      <input type="text" id="sentBy" placeholder="Sending Unit" required>

      <label>A/C Reg. / Info</label>
      <input type="text" id="note" placeholder="Aircraft Reg. or Reference" required>

      <div class="table-wrapper">
        <table id="itemsTable">
          <thead>
            <tr>
              <th width="50">No.</th>
              <th width="100">Qty</th>
              <th>Description of Goods</th>
              <th width="150">Remarks</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td><input type="text" onkeydown="checkEnterKey(event)"></td>
              <td><input type="text" onkeydown="checkEnterKey(event)"></td>
              <td><input type="text" onkeydown="checkEnterKey(event)"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="button-container">
        <button type="button" onclick="addRow()">+ Add Item</button>
        <button type="button" class="red-button" onclick="deleteRow()">- Delete Item</button>
      </div>

      <div class="canvas-container">
        <div class="signature-box">
          <label>Sender Signature</label>
          <canvas id="senderCanvas"></canvas>
          <input type="text" id="senderName" placeholder="Full Name" required>
          <button type="button" class="red-button" style="padding: 5px 10px; margin-top: 10px; font-size: 11px;" onclick="clearCanvas('senderCanvas')">Clear</button>
        </div>

        <div class="signature-box">
          <label>Receiver Signature</label>
          <canvas id="receiverCanvas"></canvas>
          <input type="text" id="receiverName" placeholder="Full Name" required>
          <button type="button" class="red-button" style="padding: 5px 10px; margin-top: 10px; font-size: 11px;" onclick="clearCanvas('receiverCanvas')">Clear</button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
        <div>
          <label>Receiver Phone</label>
          <input type="text" id="receiverPhone" placeholder="Phone Number">
        </div>
        <div>
          <label>Date & Time</label>
          <div style="display: flex; gap: 5px;">
            <input type="text" id="date" readonly>
            <input type="text" id="time" readonly>
          </div>
        </div>
      </div>

      <div class="upload-container">
        <label>Upload Image / Attachment</label>
        <input type="file" id="imageUpload" accept="image/*" onchange="previewImage(event, 'imagePreview')">
        <img id="imagePreview" src="" alt="Image Preview" style="display:none;">
      </div>

      <div class="button-container" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--primary-light);">
        <button type="button" class="green-button" onclick="saveForm()">Save Document</button>
        <button type="button" class="red-button" onclick="resetForm()">Reset Form</button>
      </div>
    </form>
  </div>

  <div class="notification" id="submissionNotification">Form submitted successfully!</div>
 <script>
  // 1. SET YOUR API URL HERE
  const API_URL = 'YOUR_WEB_APP_URL_HERE'; 

  // Menu Toggle Logic
  document.querySelector('.menu-toggle').addEventListener('click', function () {
    const menuContainer = document.querySelector('.menu-container');
    menuContainer.classList.toggle('open');
  });

  document.addEventListener('click', function (event) {
    const menuContainer = document.querySelector('.menu-container');
    if (!menuContainer.contains(event.target)) {
      menuContainer.classList.remove('open');
    }
  });

  // Generate SP No. & Date
  function initializeHeader() {
    document.getElementById('spNo').value = new Date().getTime().toString().slice(-4).padStart(7,'025');
    const now = new Date();
    document.getElementById('date').value = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    document.getElementById('time').value = now.toTimeString().split(' ')[0];
  }
  initializeHeader();

  // Table Logic
  function addRow() {
    const table = document.getElementById('itemsTable').querySelector('tbody');
    const currentRowCount = table.rows.length;
    if (currentRowCount >= 32) { alert('Maximum of 32 rows reached'); return; }

    const activeElement = document.activeElement;
    let activeCellIndex = 1; 
    if (activeElement && activeElement.tagName === 'INPUT' && activeElement.closest('tr')) {
       activeCellIndex = Array.from(activeElement.closest('tr').cells).indexOf(activeElement.closest('td'));
    }

    const row = table.insertRow();
    row.innerHTML = `
      <td>${currentRowCount + 1}</td>
      <td><input type="text" onkeydown="checkEnterKey(event)"></td>
      <td><input type="text" onkeydown="checkEnterKey(event)"></td>
      <td><input type="text" onkeydown="checkEnterKey(event)"></td>
    `;
    const targetInput = row.cells[activeCellIndex]?.querySelector('input') || row.cells[1].querySelector('input');
    if (targetInput) targetInput.focus();
  }

  function deleteRow() {
    const table = document.getElementById('itemsTable').querySelector('tbody');
    if (table.rows.length > 1) {
      table.deleteRow(-1);
    } else {
      alert('At least one row must remain');
    }
  }

  function checkEnterKey(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      addRow();
    }
  }

  // Paste Logic
  document.querySelector('#itemsTable').addEventListener('paste', function(event) {
    const activeElement = document.activeElement;
    const table = document.getElementById('itemsTable').querySelector('tbody');
    const currentRow = activeElement.closest('tr');
    const activeCell = activeElement.closest('td');
    const columnIndex = Array.from(currentRow.cells).indexOf(activeCell);

    if (columnIndex === 2) handlePasteDescription(event, table, currentRow);
    else if (columnIndex === 1) handlePasteQuantity(event, table, currentRow);
  });

  function handlePasteDescription(event, table, currentRow) {
    const pastedData = (event.clipboardData || window.clipboardData).getData('text').trim();
    const rows = pastedData.split('\n').filter(r => r.trim() !== '');
    rows.forEach((data, i) => {
      if (i === 0) currentRow.cells[2].querySelector('input').value = data;
      else {
        const nr = table.insertRow();
        nr.innerHTML = `<td>${table.rows.length}</td><td><input type="text"></td><td><input type="text" value="${data.trim()}"></td><td><input type="text"></td>`;
      }
    });
    event.preventDefault();
  }

  function handlePasteQuantity(event, table, currentRow) {
    const pastedData = (event.clipboardData || window.clipboardData).getData('text').trim();
    const rows = pastedData.split('\n').filter(r => r.trim() !== '');
    rows.forEach((rowStr, i) => {
      if (table.rows.length >= 32) return;
      const cols = rowStr.split(/\t+/);
      if (cols.length < 2) return;
      const [qty, desc, rem] = cols.map(c => c.trim());
      if (i === 0) {
        currentRow.cells[1].querySelector('input').value = qty || '';
        currentRow.cells[2].querySelector('input').value = desc || '';
        currentRow.cells[3].querySelector('input').value = rem || '';
      } else {
        const nr = table.insertRow();
        nr.innerHTML = `<td>${table.rows.length}</td>
          <td><input type="text" value="${qty || ''}"></td>
          <td><input type="text" value="${desc || ''}"></td>
          <td><input type="text" value="${rem || ''}"></td>`;
      }
    });
    event.preventDefault();
  }

  // Form Submission via API
  async function saveForm() {
    const requiredFields = [
      { id: 'to', label: 'To' },
      { id: 'sentBy', label: 'Sent By' },
      { id: 'note', label: 'Note' },
      { id: 'senderName', label: 'Sender Name' },
      { id: 'receiverName', label: 'Receiver Name' }
    ];

    let missingFields = [];
    requiredFields.forEach(field => {
      const input = document.getElementById(field.id);
      if (!input.value.trim()) {
        missingFields.push(field.label);
        input.style.border = '1px solid #b35c5c';
      } else {
        input.style.border = '';
      }
    });

    const rows = document.querySelectorAll('#itemsTable tbody tr');
    if (!rows[0].cells[2].querySelector('input').value.trim()) {
      missingFields.push('Table Items (Description)');
    }

    if (missingFields.length > 0) {
      alert('Required: ' + missingFields.join(', '));
      return;
    }

    document.getElementById('loadingGif').style.display = 'flex';

    const formData = {
      spNo: document.getElementById('spNo').value,
      to: document.getElementById('to').value,
      sentBy: document.getElementById('sentBy').value,
      note: document.getElementById('note').value,
      items: Array.from(rows).map((row, i) => ({
        no: i + 1,
        qty: row.cells[1].querySelector('input').value,
        desc: row.cells[2].querySelector('input').value,
        remarks: row.cells[3].querySelector('input').value
      })),
      senderName: document.getElementById('senderName').value,
      receiverName: document.getElementById('receiverName').value,
      receiverPhone: document.getElementById('receiverPhone').value,
      date: document.getElementById('date').value,
      time: document.getElementById('time').value,
      senderSig: document.getElementById('senderCanvas').toDataURL(),
      receiverSig: document.getElementById('receiverCanvas').toDataURL(),
      image: document.getElementById('imagePreview').src || ''
    };

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors', // Note: use 'cors' if your API supports it. 'no-cors' won't allow reading response.
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });

      // If using Apps Script Web App with 'no-cors', we assume success if no error is thrown
      document.getElementById('loadingGif').style.display = 'none';
      document.getElementById('submissionNotification').style.display = 'block';
      
      setTimeout(() => {
        alert('Data submitted successfully!');
        location.reload();
      }, 1000);

    } catch (error) {
      document.getElementById('loadingGif').style.display = 'none';
      alert('Error: ' + error.message);
    }
  }

  // Canvas & Setup
  function setupCanvas(canvasId) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    let drawing = false;
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#226873";

    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return [clientX - rect.left, clientY - rect.top];
    };

    const start = (e) => { drawing = true; const [x,y] = getPos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
    const move = (e) => { if(!drawing) return; const [x,y] = getPos(e); ctx.lineTo(x,y); ctx.stroke(); e.preventDefault(); };
    const stop = () => drawing = false;

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    canvas.addEventListener('touchend', stop);
  }

  function clearCanvas(id) {
    const c = document.getElementById(id);
    c.getContext('2d').clearRect(0,0,c.width,c.height);
  }

  function resetForm() { if(confirm('Clear all data?')) location.reload(); }

  function previewImage(event, id) {
    const reader = new FileReader();
    reader.onload = () => { const img = document.getElementById(id); img.src = reader.result; img.style.display = 'block'; };
    if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
  }

  window.onload = () => {
    setupCanvas('senderCanvas');
    setupCanvas('receiverCanvas');
  };
</script>
</body>
</html>
