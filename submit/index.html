<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surat Pengiriman | GMF</title>
<style>
  :root {
    --primary: #226873;
    --primary-light: #f0f6f7;
    --primary-border: #d1e2e5;
    --text-main: #2c3e50;
    --text-muted: #546e7a;
    --white: #ffffff;
    --soft-red: #b35c5c;
    --soft-green: #4b8c7d;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--white);
    color: var(--text-main);
    margin: 0;
    padding: 10px;
    line-height: 1.5;
  }

  .form-container {
    background-color: var(--white);
    max-width: 850px;
    margin: 10px auto;
    padding: 30px;
    border: 1px solid var(--primary-border);
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(34, 104, 115, 0.08);
    position: relative;
  }

  /* Menu */
  .menu-container {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 100;
  }
  .menu-toggle {
    background-color: var(--primary);
    color: white;
    border: none;
    padding: 8px 12px;
    font-size: 20px;
    border-radius: 4px;
    cursor: pointer;
  }
  .menu-dropdown {
    display: none;
    position: absolute;
    top: 45px;
    right: 0;
    background-color: white;
    border: 1px solid var(--primary-border);
    box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
    border-radius: 4px;
    min-width: 180px;
  }
  .menu-dropdown a {
    display: block;
    color: var(--text-main);
    text-decoration: none;
    padding: 12px 16px;
    font-size: 14px;
    border-bottom: 1px solid #f5f5f5;
  }
  .menu-container.open .menu-dropdown { display: block; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    border-bottom: 2px solid var(--primary-light);
    padding-bottom: 20px;
  }
  .header img { width: 160px; margin-bottom: 15px; }
  .header h1 { margin: 0; font-size: 22px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
  .header h2 { margin: 5px 0 0; font-size: 13px; font-weight: 400; color: var(--text-muted); letter-spacing: 2px; }

  /* Form Elements */
  label {
    font-weight: 600;
    display: block;
    margin: 15px 0 6px;
    font-size: 11px;
    color: var(--primary);
    text-transform: uppercase;
  }
  input {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--primary-border);
    border-radius: 4px;
    box-sizing: border-box;
    font-size: 14px;
    background-color: #fafbfc;
  }
  input:focus { outline: none; border-color: var(--primary); background-color: #fff; }
  input[readonly] { background-color: var(--primary-light); color: var(--text-muted); }

  /* Table - Center Aligned No Column */
  .table-wrapper { overflow-x: auto; margin: 25px 0; }
  table { width: 100%; border-collapse: collapse; min-width: 600px; }
  th { background-color: var(--primary); color: white; font-weight: 500; font-size: 12px; padding: 12px; text-transform: uppercase; }
  
  td { border: 1px solid var(--primary-border); padding: 5px; text-align: center; font-size: 14px; }
  td input { border: none; background: transparent; text-align: center; }
  td:nth-child(3) input { text-align: left; } /* Description left aligned */

  /* Signatures */
  .canvas-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 20px;
    margin-top: 30px;
  }
  .signature-box {
    flex: 1;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
    background-color: var(--primary-light);
    border-radius: 6px;
  }
  canvas {
    border: 1px solid var(--primary-border);
    background-color: white;
    width: 100%;
    height: 120px;
    border-radius: 4px;
    touch-action: none;
  }

  /* Buttons */
  .button-container { text-align: center; margin: 25px 0; display: flex; justify-content: center; gap: 10px; }
  button {
    background-color: var(--primary);
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .red-button { background-color: var(--soft-red); }
  .green-button { background-color: var(--soft-green); padding: 12px 35px; font-size: 14px; }

  /* Utilities */
  .upload-container { margin-top: 30px; padding: 20px; border: 2px dashed var(--primary-border); border-radius: 8px; text-align: center; }
  #imagePreview { max-width: 250px; margin-top: 15px; border-radius: 4px; }
  #loadingGif { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
  .notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--soft-green); color: white; padding: 12px 25px; border-radius: 30px; display: none; z-index: 1001; }

  @media (max-width: 600px) {
    .form-container { padding: 15px; }
    .signature-box { min-width: 100%; }
    .button-container { flex-direction: column; }
    button { width: 100%; }
  }
</style>
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loadingGif">
    <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExeWc0djRoenZ1YWhjcjdkMmk3YWN6dGpvN29qZGo1bGViMzI4OXdqcyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/eK7Nj68Yur6vRmVyqN/giphy.gif" alt="Loading..." width="80">
  </div>

  <div class="form-container">
    <!-- Menu -->
    <div class="menu-container">
      <button class="menu-toggle" type="button">☰</button>
      <div class="menu-dropdown">
        <a href="https://shorturl.at/lgPJ7" target="_blank">Edit SP</a>
        <a href="https://shorturl.at/uSCeY" target="_blank">Dashboard</a>
        <a href="#" onclick="location.reload()">Refresh</a>
      </div>
    </div>

    <!-- Header -->
    <div class="header">
      <img src="https://www.gmf-aeroasia.co.id/cfind/source/thumb/images/cover_w241_h51_gmf%20aeroasia%20logo%20new%20blue.png" alt="Logo">
      <h1>Surat Pengiriman</h1>
      <h2>SHIPPING DOCUMENT</h2>
    </div>

    <form id="shippingForm">
      <label>SP No.</label>
      <input type="text" id="spNo" readonly>

      <label>To (Unit Tujuan)</label>
      <input type="text" id="to" placeholder="Enter Destination Unit" required>

      <label>Sent By (Unit Pengirim)</label>
      <input type="text" id="sentBy" placeholder="Enter Sending Unit" required>

      <label>A/C Reg. / Info</label>
      <input type="text" id="note" placeholder="Aircraft Reg. or Reference" required>

      <div class="table-wrapper">
        <table id="itemsTable">
          <thead>
            <tr>
              <th width="50">No.</th>
              <th width="100">Qty</th>
              <th>Description of Goods</th>
              <th width="150">Remarks</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td><input type="text" onkeydown="checkEnterKey(event)"></td>
              <td><input type="text" onkeydown="checkEnterKey(event)"></td>
              <td><input type="text" onkeydown="checkEnterKey(event)"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="button-container">
        <button type="button" onclick="addRow()">+ Add Item</button>
        <button type="button" class="red-button" onclick="deleteRow()">- Delete Item</button>
      </div>

      <div class="canvas-container">
        <!-- Sender -->
        <div class="signature-box">
          <label>Sender Signature</label>
          <canvas id="senderCanvas"></canvas>
          <input type="text" id="senderName" placeholder="Full Name" required>
          <button type="button" class="red-button" style="padding: 5px 10px; margin-top: 10px; font-size: 11px;" onclick="clearCanvas('senderCanvas')">Clear</button>
        </div>

        <!-- Receiver -->
        <div class="signature-box">
          <label>Receiver Signature</label>
          <canvas id="receiverCanvas"></canvas>
          <input type="text" id="receiverName" placeholder="Full Name" required>
          <button type="button" class="red-button" style="padding: 5px 10px; margin-top: 10px; font-size: 11px;" onclick="clearCanvas('receiverCanvas')">Clear</button>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
        <div>
          <label>Receiver Phone</label>
          <input type="text" id="receiverPhone" placeholder="Phone Number">
        </div>
        <div>
          <label>Date & Time</label>
          <div style="display: flex; gap: 5px;">
            <input type="text" id="date" readonly>
            <input type="text" id="time" readonly>
          </div>
        </div>
      </div>

      <!-- Image Section -->
      <div class="upload-container">
        <label>Upload Image / Attachment</label>
        <input type="file" id="imageUpload" accept="image/*" onchange="previewImage(event, 'imagePreview')">
        <img id="imagePreview" src="" alt="Image Preview" style="display:none;">
      </div>

      <!-- Footer Buttons -->
      <div class="button-container" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--primary-light);">
        <button type="button" class="green-button" onclick="saveForm()">Save Document</button>
        <button type="button" class="red-button" onclick="resetForm()">Reset Form</button>
      </div>
    </form>
  </div>

  <div class="notification" id="submissionNotification">Form submitted successfully!</div>

<script>
  // 1. SET YOUR API URL HERE
  const API_URL = 'https://script.google.com/macros/s/AKfycbznK0WCLsVkhB--WZVzaKD-lFvN3d6HtXEjMtpRBPyYJGikF2oxxmblhRmyzfnq2VdlPA/exec'; 

  let isEditMode = false; // Flag to indicate if the form is in edit mode

  // Menu Toggle Logic
  document.querySelector('.menu-toggle').addEventListener('click', function () {
    const menuContainer = document.querySelector('.menu-container');
    menuContainer.classList.toggle('open');
  });

  document.addEventListener('click', function (event) {
    const menuContainer = document.querySelector('.menu-container');
    if (!menuContainer.contains(event.target)) {
      menuContainer.classList.remove('open');
    }
  });

  // Generate SP No. & Date (Modified to respect edit mode)
  function initializeHeader() {
    if (!isEditMode) { // Only generate if not in edit mode
      document.getElementById('spNo').value = new Date().getTime().toString().slice(-4).padStart(7,'025');
      const now = new Date();
      document.getElementById('date').value = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      document.getElementById('time').value = now.toTimeString().split(' ')[0];
    }
  }
  // initializeHeader(); // This will now be called by window.onload

  // Table Logic
  function addRow(qty = '', desc = '', rem = '') {
    const table = document.getElementById('itemsTable').querySelector('tbody');
    const currentRowCount = table.rows.length;
    if (currentRowCount >= 32) { 
        if (!isEditMode) alert('Maximum of 32 rows reached'); // Suppress alert during programmatic fill
        return; 
    }

    const row = table.insertRow();
    row.innerHTML = `
      <td>${currentRowCount + 1}</td>
      <td><input type="text" value="${qty}" onkeydown="checkEnterKey(event)"></td>
      <td><input type="text" value="${desc}" onkeydown="checkEnterKey(event)"></td>
      <td><input type="text" value="${rem}" onkeydown="checkEnterKey(event)"></td>
    `;
    // Only focus if not in edit mode or if it's the last row being added manually
    if (!isEditMode && qty === '' && desc === '' && rem === '') {
        const activeElement = document.activeElement;
        let activeCellIndex = 1; 
        if (activeElement && activeElement.tagName === 'INPUT' && activeElement.closest('tr')) {
           activeCellIndex = Array.from(activeElement.closest('tr').cells).indexOf(activeElement.closest('td'));
        }
        const targetInput = row.cells[activeCellIndex]?.querySelector('input') || row.cells[1].querySelector('input');
        if (targetInput) targetInput.focus();
    }
  }

  function deleteRow() {
    const table = document.getElementById('itemsTable').querySelector('tbody');
    if (table.rows.length > 1) {
      table.deleteRow(-1);
    } else {
      alert('At least one row must remain');
    }
  }

  function checkEnterKey(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      addRow();
    }
  }

  // Paste Logic
  document.querySelector('#itemsTable').addEventListener('paste', function(event) {
    const activeElement = document.activeElement;
    const table = document.getElementById('itemsTable').querySelector('tbody');
    const currentRow = activeElement.closest('tr');
    const activeCell = activeElement.closest('td');
    const columnIndex = Array.from(currentRow.cells).indexOf(activeCell);

    if (columnIndex === 2) handlePasteDescription(event, table, currentRow);
    else if (columnIndex === 1) handlePasteQuantity(event, table, currentRow);
  });

  function handlePasteDescription(event, table, currentRow) {
    const pastedData = (event.clipboardData || window.clipboardData).getData('text').trim();
    const rows = pastedData.split('\n').filter(r => r.trim() !== '');
    rows.forEach((data, i) => {
      if (i === 0) currentRow.cells[2].querySelector('input').value = data;
      else {
        addRow('', data.trim(), ''); // Use addRow to handle new rows
      }
    });
    event.preventDefault();
  }

  function handlePasteQuantity(event, table, currentRow) {
    const pastedData = (event.clipboardData || window.clipboardData).getData('text').trim();
    const rows = pastedData.split('\n').filter(r => r.trim() !== '');
    rows.forEach((rowStr, i) => {
      if (table.rows.length >= 32) return;
      const cols = rowStr.split(/\t+/);
      if (cols.length < 2) return;
      const [qty, desc, rem] = cols.map(c => c.trim());
      if (i === 0) {
        currentRow.cells[1].querySelector('input').value = qty || '';
        currentRow.cells[2].querySelector('input').value = desc || '';
        currentRow.cells[3].querySelector('input').value = rem || '';
      } else {
        addRow(qty, desc, rem); // Use addRow to handle new rows
      }
    });
    event.preventDefault();
  }

async function saveForm() {
  const requiredFields = [
    { id: 'to', label: 'To' },
    { id: 'sentBy', label: 'Sent By' },
    { id: 'note', label: 'Note' },
    { id: 'senderName', label: 'Sender Name' },
    { id: 'receiverName', label: 'Receiver Name' }
  ];

  let missingFields = [];
  requiredFields.forEach(field => {
    const input = document.getElementById(field.id);
    if (!input.value.trim()) {
      missingFields.push(field.label);
      input.style.border = '1px solid var(--soft-red)'; // Use CSS variable
    } else {
      input.style.border = '';
    }
  });

  const rows = document.querySelectorAll('#itemsTable tbody tr');
  const firstDescriptionInput = rows[0]?.cells[2]?.querySelector('input');
  if (!firstDescriptionInput || !firstDescriptionInput.value.trim()) {
    missingFields.push('Table Items (Description)');
    if (firstDescriptionInput) firstDescriptionInput.style.border = '1px solid var(--soft-red)';
  } else {
    if (firstDescriptionInput) firstDescriptionInput.style.border = '';
  }


  if (missingFields.length > 0) {
    alert('Required: ' + missingFields.join(', '));
    return;
  }

  const senderCanvas = document.getElementById('senderCanvas');
  const receiverCanvas = document.getElementById('receiverCanvas');
  const imgPreview = document.getElementById('imagePreview');

  document.getElementById('loadingGif').style.display = 'flex';

  const formData = {
    spNo: document.getElementById('spNo').value,
    to: document.getElementById('to').value,
    sentBy: document.getElementById('sentBy').value,
    note: document.getElementById('note').value,
    senderName: document.getElementById('senderName').value,
    receiverName: document.getElementById('receiverName').value,
    receiverPhone: document.getElementById('receiverPhone').value,
    date: document.getElementById('date').value,
    time: document.getElementById('time').value,
    
    senderSignature: senderCanvas.toDataURL(),
    receiverSignature: receiverCanvas.toDataURL(),
    
    uploadedImage: (imgPreview.style.display !== 'none' && imgPreview.src.startsWith('data:image')) ? imgPreview.src : '',
    
    tableData: Array.from(rows).map((row, i) => ({
      quantity: row.cells[1].querySelector('input').value,    
      description: row.cells[2].querySelector('input').value, 
      remarks: row.cells[3].querySelector('input').value      
    }))
  };

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors', 
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    setTimeout(() => {
      document.getElementById('loadingGif').style.display = 'none';
      document.getElementById('submissionNotification').style.display = 'block';
      alert('Form Submitted Successfully!');
      // Consider redirecting back to index.html after edit/submission
      // window.location.href = '/index.html'; // Or whatever your main page is
      location.reload(); 
    }, 2500);

  } catch (error) {
    document.getElementById('loadingGif').style.display = 'none';
    console.error('Submission Error:', error);
    alert('Error submitting form: ' + error.message);
  }
}

  // Canvas & Setup
function setupCanvas(canvasId) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  
  const ratio = window.devicePixelRatio || 1;
  const width = canvas.offsetWidth;
  const height = canvas.offsetHeight;
  canvas.width = width * ratio;
  canvas.height = height * ratio;
  ctx.scale(ratio, ratio);

  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = "#226873";

  let drawing = false;
  let lastPoint = { x: 0, y: 0 };

  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - rect.left,
      y: clientY - rect.top
    };
  };

  const start = (e) => {
    drawing = true;
    lastPoint = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastPoint.x, lastPoint.y);
    e.preventDefault();
  };

  const move = (e) => {
    if (!drawing) return;
    e.preventDefault();

    const currentPoint = getPos(e);
    
    const midPoint = {
      x: lastPoint.x + (currentPoint.x - lastPoint.x) / 2,
      y: lastPoint.y + (currentPoint.y - lastPoint.y) / 2
    };

    ctx.quadraticCurveTo(lastPoint.x, lastPoint.y, midPoint.x, midPoint.y);
    ctx.stroke();
    
    lastPoint = currentPoint;
  };

  const stop = () => {
    if (drawing) {
      ctx.lineTo(lastPoint.x, lastPoint.y);
      ctx.stroke();
      ctx.closePath();
      drawing = false;
    }
  };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', stop);

  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', stop);
}

  function clearCanvas(id) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.restore();
}

  function resetForm() { 
    if(confirm('Clear all data?')) {
        localStorage.removeItem('editSPData'); // Also clear edit data on reset
        location.reload(); 
    }
  }

  function previewImage(event, id) {
    const reader = new FileReader();
    reader.onload = () => { const img = document.getElementById(id); img.src = reader.result; img.style.display = 'block'; };
    if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
  }

  // NEW: Function to load base64 image onto a canvas
  function loadImageOntoCanvas(canvasId, imageData) {
    if (!imageData || imageData === '') return;
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      // Clear existing content and draw the image
      clearCanvas(canvasId); 
      ctx.drawImage(img, 0, 0, canvas.offsetWidth, canvas.offsetHeight);
    };
    img.src = imageData;
  }

  // NEW: Function to populate the form with existing data
  function populateFormForEdit(data) {
    isEditMode = true; // Set edit mode flag
    
    document.getElementById('spNo').value = data["SP No."] || '';
    document.getElementById('to').value = data["To"] || '';
    document.getElementById('sentBy').value = data["Sent By"] || '';
    document.getElementById('note').value = data["Note"] || '';
    document.getElementById('senderName').value = data["Sender Name"] || '';
    document.getElementById('receiverName').value = data["Receiver Name"] || '';
    document.getElementById('receiverPhone').value = data["Receiver Phone"] || '';
    document.getElementById('date').value = data["Date"] || '';
    document.getElementById('time').value = data["Time"] || '';

    // Populate Table Data
    const tableBody = document.getElementById('itemsTable').querySelector('tbody');
    tableBody.innerHTML = ''; // Clear existing default row
    
    const descriptionText = data["Description"] || '';
    if (descriptionText) {
      const lines = descriptionText.split('\n').filter(l => l.trim() !== "");
      lines.forEach(line => {
        const cols = line.split('|').map(c => c.trim());
        addRow(cols[0], cols[1], cols[2]);
      });
    }

    // If no description, add one empty row
    if (!descriptionText || lines.length === 0) {
        addRow(); 
    }

    // Populate Signatures
    if (data["Sender Signature"]) {
        loadImageOntoCanvas('senderCanvas', data["Sender Signature"]);
    }
    if (data["Receiver Signature"]) {
        loadImageOntoCanvas('receiverCanvas', data["Receiver Signature"]);
    }

    // Populate Uploaded Image (Evidence)
    const imgPreview = document.getElementById('imagePreview');
    if (data["Evidence"] && data["Evidence"].startsWith('data:image')) {
        imgPreview.src = data["Evidence"];
        imgPreview.style.display = 'block';
    } else {
        imgPreview.style.display = 'none';
        imgPreview.src = '';
    }
    
    // You might want to change the submit button text or appearance in edit mode
    // document.getElementById('saveButton').textContent = 'Update SP';
  }

  // Initial setup when the page loads
  window.onload = () => {
    setupCanvas('senderCanvas');
    setupCanvas('receiverCanvas');
    
    // Check for edit data in localStorage
    const editDataJson = localStorage.getItem('editSPData');
    if (editDataJson) {
        try {
            const data = JSON.parse(editDataJson);
            populateFormForEdit(data);
        } catch (e) {
            console.error("Error parsing edit data from localStorage:", e);
            initializeHeader(); // Fallback to new form if data is corrupt
            addRow(); // Add an initial row for a new form
        } finally {
            localStorage.removeItem('editSPData'); // Clear it after use
        }
    } else {
        initializeHeader(); // Generate new data if not in edit mode
        addRow(); // Add an initial row for a new form
    }
  };
</script>
</body>
</html>
